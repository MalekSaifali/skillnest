version: 1
frontend:
  phases:
    preBuild:
      commands:
        - ls
        - find . -name "package.json" -maxdepth 4 -not -path "*/node_modules/*"
        - cd Desktop/skillnest/client
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: Desktop/skillnest/client/.next
    files:
      - '**/*'
  cache:
    paths:
      - Desktop/skillnest/client/node_modules/**/*
